<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>App Rødekors ungdommen</title>
        <link rel="stylesheet" href="style.css">
        <script src="javascript/rikke.js" defer></script>
       
        
    </head>
        
        <body>
            
            <header class="app-header">
                <div class="header-leftside">
                    <a href="mine_vagter.html" class="brand-button">
                        <img src="images/brand_logo.png" alt="røde kors ungdom forkortet logo" class="logo-img">
                    </a>
                </div>
                <h1 class="header-title">Kalender</h1>
                <div class="header-rightside"></div>
            </header>

                 <main>
                    <div class="calender">
                        <div class="calender_header">
                           
                           <h2 id="monthYear">Marts 2026</h2>
                           
                        </div>
                       <!--kode inspireret fra https://www.w3schools.com/howto/howto_css_calendar.asp-->
                     <div class="calender-weekday">
                        <span>Man</span>
                        <span>Tir</span>
                        <span>Ons</span>
                        <span>Tor</span>
                        <span>Fre</span>
                        <span>Lør</span>
                        <span>Søn</span>
                        </div>    
                    
                        <ul id="daysContainer"></ul>
                    </div>
                        <!--kode inspireret med Ai prompt (6) linje 46-61-->
                      <div class="status-container">
                        <div class="status-items">
                            <span class="dot green"></span>
                            <span class="status-text">Mine vagter</span>
                        </div>

                        <div class="status-items">
                            <span class="dot yellow"></span>
                            <span class="status-text">Afvent vagter</span>
                        </div>

                        <div class="status-items">
                            <span class="dot red"></span>
                            <span class="status-text">Ledige vagter</span>
                        </div>
                    </div>

                    <div id="eventBox" class="event-box">
                        Vælg en dag
                    </div>

                    <!-- Genbrug fra Bára's "mine vagter"-->

                    <section class="overblik-vagter"> <!--koden er valideret med https://validator.w3.org/nu/#textarea og der er en warning med manglende H1 på linje 69-->

                     <a href="min-vagt.html" class="card-vagt__link">
                    <article class="card-vagt">
                        <p class="card-vagt__date">Ons. 1.<br>April</p>
                        <div class="card-vagt__line"></div>
                           <div class="card-vagt__text">
                              <div class="card-vagt__heading">
                                 <span class="card-vagt__dot card-vagt__dot--bekræftet"></span>
                                 <h2 class="card-vagt__title">Caféfrivillig</h2>
                              </div>
                              <p class="card-vagt__time">14.00-17.00, Netværkshuset</p>
                              <p class="card-vagt__location">Østre stadionsvej 33<br>5000 Odense C</p>
                           </div>
                    </article>
                    </a>

                    </section>


                </main>
                    
                
                  <!--kode inspireret fra https://www.w3schools.com/howto/howto_css_icon_buttons.asp-->    
            <footer class="footer">
                <nav class="bottom-nav">
                    <a href="mine_vagter.html" class="nav-buttons">
                        <img src="images/hjem.png" alt="hjem-button" class="nav-icon">
                    </a>
                    
                    <a href="meddelelser.html" class="nav-buttons">
                        <img src="images/meddelelser.png" alt="meddelelser-button" class="nav-icon">
                    </a>

                    <a href="kalender.html" class="nav-buttons">
                        <img src="images/kalender.png" alt="kalender-button" class="nav-icon">
                    </a>

                    <a href="min_profil.html" class="nav-buttons">
                        <img src="images/profil.png" alt="min_profil-button" class="nav-icon">
                    </a>
                </nav>
            </footer>
            

        </body>
</html>
